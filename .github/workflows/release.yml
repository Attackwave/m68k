name: Build and Publish Release Assets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  approve:
    name: Approve release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release approved for ${{ github.ref_name }}"

  build-and-release:
    needs: approve
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: '.exe'
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ''
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -eu
          staging="m68k-${{ matrix.target }}"
          mkdir -p "$staging"
          for bin in m68k-asm m68k-disasm m68k-floppy; do
            cp "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" "$staging/"
          done
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${staging}.zip" "$staging"
            echo "ASSET=${staging}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${staging}.tar.gz" "$staging"
            echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
